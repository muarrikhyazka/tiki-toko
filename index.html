<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiki Toko — Barang Bekas Berkualitas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <h1>🏷️ Tiki Toko</h1>
    </div>
  </header>

  <section class="hero">
    <h2>Barang Bekas Berkualitas,<br>Harga Bersahabat</h2>
    <span class="badge">📦 Kondisi terawat · Nego santai</span>
  </section>

  <div class="controls">
    <input
      class="search-box"
      type="search"
      id="searchInput"
      placeholder="🔍 Cari produk..."
    />
    <select class="filter-select" id="sortSelect">
      <option value="default">Urutan default</option>
      <option value="price-asc">Harga: Termurah</option>
      <option value="price-desc">Harga: Termahal</option>
    </select>
    <button class="view-toggle" id="viewToggle" onclick="toggleView()" title="Ubah tampilan">⊞</button>
  </div>

  <div class="product-count" id="productCount"></div>

  <div class="grid" id="productGrid"></div>

  <!-- Modal detail produk -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modalContent"></div>
  </div>

  <footer>
    <p>© 2025 Tiki Toko · Hubungi via WhatsApp untuk tanya &amp; nego</p>
  </footer>

  <script src="products.js"></script>
  <script>
    let isListView = false;

    function formatPrice(price) {
      return "Rp " + price.toLocaleString("id-ID");
    }

    function buildWaLink(product) {
      const text = encodeURIComponent(
        `Halo, saya tertarik dengan *${product.name}* (${formatPrice(product.price)}). Apakah masih tersedia?`
      );
      return `https://wa.me/${WHATSAPP_NUMBER}?text=${text}`;
    }

    function buildCarousel(p, idPrefix) {
      const hasImages = p.images && p.images.length > 0;
      if (!hasImages) {
        return `<div class="carousel-placeholder">📦</div>`;
      }

      const slides = p.images.map((img) =>
        `<img class="carousel-slide" src="${p.imageFolder}/${img}" alt="${p.name}" loading="lazy">`
      ).join("");

      const dots = p.images.length > 1
        ? `<div class="carousel-dots">${p.images.map((_, i) =>
            `<span class="dot${i === 0 ? " active" : ""}"></span>`
          ).join("")}</div>`
        : "";

      return `
        <div class="carousel" data-id="${idPrefix}-${p.id}">
          <div class="carousel-track">${slides}</div>
          ${dots}
        </div>`;
    }

    function buildCardEcomLinks(p) {
      if (!p.ecommerceLinks || p.ecommerceLinks.length === 0) return "";
      const links = p.ecommerceLinks.map((e, i) => {
        const sep = i < p.ecommerceLinks.length - 1
          ? `<span class="card-ecom-sep">·</span>` : "";
        return `<a class="card-ecom-link" href="${e.url}" target="_blank" rel="noopener"
          onclick="event.stopPropagation()">${e.label} ↗</a>${sep}`;
      }).join("");
      return `
        <div class="card-ecom-links">
          <span class="card-ecom-label">Cek harga baru:</span>
          <div>${links}</div>
        </div>`;
    }

    function buildModalEcomLinks(p) {
      if (!p.ecommerceLinks || p.ecommerceLinks.length === 0) return "";
      const buttons = p.ecommerceLinks.map((e) =>
        `<a class="modal-ecom-btn" href="${e.url}" target="_blank" rel="noopener">${e.label} ↗</a>`
      ).join("");
      return `<div class="modal-ecom-links">${buttons}</div>`;
    }

    function initCarousels() {
      document.querySelectorAll(".carousel").forEach((carousel) => {
        const track = carousel.querySelector(".carousel-track");
        const dots = carousel.querySelectorAll(".dot");
        if (!track || dots.length === 0) return;
        // remove old listener by cloning
        const fresh = track.cloneNode(true);
        track.parentNode.replaceChild(fresh, track);
        fresh.addEventListener("scroll", () => {
          const idx = Math.round(fresh.scrollLeft / fresh.offsetWidth);
          dots.forEach((d, i) => d.classList.toggle("active", i === idx));
        }, { passive: true });
      });
    }

    function renderGrid(list) {
      const grid = document.getElementById("productGrid");
      const count = document.getElementById("productCount");

      count.textContent = `Menampilkan ${list.length} produk`;

      if (list.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div style="font-size:3rem">🔍</div>
            <p>Produk tidak ditemukan.</p>
          </div>`;
        return;
      }

      grid.innerHTML = list.map((p) => {
        const brand = p.brand
          ? `<div class="card-brand">${p.brand}</div>` : "";

        return `
          <div class="card" onclick="openModal(${p.id})">
            ${buildCarousel(p, "card")}
            <div class="card-body">
              <div class="card-name">${p.name}</div>
              ${brand}
              <div class="card-price">${formatPrice(p.price)}</div>
              <div class="card-desc">${p.description}</div>
              ${buildCardEcomLinks(p)}
              <a class="btn-wa" href="${buildWaLink(p)}" target="_blank" rel="noopener"
                onclick="event.stopPropagation()">
                💬 Chat WA
              </a>
            </div>
          </div>`;
      }).join("");

      initCarousels();
    }

    function toggleView() {
      isListView = !isListView;
      const grid = document.getElementById("productGrid");
      const btn = document.getElementById("viewToggle");
      grid.classList.toggle("list-view", isListView);
      btn.textContent = isListView ? "⊞" : "☰";
      btn.title = isListView ? "Tampilan grid" : "Tampilan list";
    }

    function getFiltered() {
      const query = document.getElementById("searchInput").value.toLowerCase().trim();
      const sort = document.getElementById("sortSelect").value;

      let list = products.filter((p) =>
        p.name.toLowerCase().includes(query) ||
        (p.brand || "").toLowerCase().includes(query) ||
        p.description.toLowerCase().includes(query)
      );

      if (sort === "price-asc") list.sort((a, b) => a.price - b.price);
      if (sort === "price-desc") list.sort((a, b) => b.price - a.price);

      return list;
    }

    function openModal(id) {
      const p = products.find((x) => x.id === id);
      if (!p) return;

      const brand = p.brand
        ? `<div class="modal-brand">${p.brand}</div>` : "";

      document.getElementById("modalContent").innerHTML = `
        ${buildCarousel(p, "modal")}
        <div class="modal-body">
          <div class="modal-name">${p.name}</div>
          ${brand}
          <div class="modal-price">${formatPrice(p.price)}</div>
          ${buildModalEcomLinks(p)}
          <div class="modal-desc">${p.description}</div>
          <div class="modal-actions">
            <a class="btn-wa-modal" href="${buildWaLink(p)}" target="_blank" rel="noopener">
              💬 Chat WhatsApp
            </a>
            <button class="btn-close"
              onclick="document.getElementById('modalOverlay').classList.remove('active');document.body.style.overflow=''">
              Tutup
            </button>
          </div>
        </div>`;

      document.getElementById("modalOverlay").classList.add("active");
      document.body.style.overflow = "hidden";
      initCarousels();
    }

    function closeModal(event) {
      if (event.target === document.getElementById("modalOverlay")) {
        document.getElementById("modalOverlay").classList.remove("active");
        document.body.style.overflow = "";
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        document.getElementById("modalOverlay").classList.remove("active");
        document.body.style.overflow = "";
      }
    });

    document.getElementById("searchInput").addEventListener("input", () => renderGrid(getFiltered()));
    document.getElementById("sortSelect").addEventListener("change", () => renderGrid(getFiltered()));

    renderGrid(getFiltered());
  </script>
</body>
</html>
