<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Tiki Toko</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏷️</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #FF4081 0%, #ff6baa 100%);
    }

    .login-card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .login-card .logo { font-size: 2.5rem; margin-bottom: 6px; }

    .login-card h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #FF4081;
      margin-bottom: 4px;
    }

    .login-card p {
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 28px;
    }

    .login-card input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #eee;
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .login-card input:focus { border-color: #FF4081; }

    .btn-login {
      width: 100%;
      background: #FF4081;
      color: white;
      border: none;
      padding: 13px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-login:hover { background: #e0356e; }
    .login-error { color: #e53935; font-size: 0.82rem; margin-top: 10px; min-height: 18px; }

    /* ── DASHBOARD ── */
    .dash-header {
      background: #FF4081;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      gap: 12px;
    }

    .dash-header h1 { font-size: 1.1rem; font-weight: 700; }
    .dash-header .subtitle { font-size: 0.78rem; opacity: 0.85; margin-top: 2px; }

    .header-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .btn-header {
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.4);
      padding: 6px 13px;
      border-radius: 8px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-header:hover { background: rgba(255,255,255,0.35); }

    .dash-body {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    /* Summary cards */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: white;
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .stat-card .label {
      font-size: 0.72rem;
      color: #aaa;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-card .value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #FF4081;
      line-height: 1;
    }

    .stat-card .sub { font-size: 0.78rem; color: #888; margin-top: 4px; }

    /* Table */
    .table-wrap {
      background: white;
      border-radius: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .table-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      gap: 10px;
    }

    .table-head h2 { font-size: 0.95rem; font-weight: 700; }

    .updated-at { font-size: 0.75rem; color: #bbb; flex: 1; }

    .btn-reset {
      background: none;
      border: 1px solid #eee;
      color: #aaa;
      padding: 5px 12px;
      border-radius: 7px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    .btn-reset:hover { border-color: #e53935; color: #e53935; }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      background: #fafafa;
      text-align: left;
      padding: 11px 16px;
      font-size: 0.75rem;
      color: #999;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      border-bottom: 1px solid #f0f0f0;
    }

    tbody tr { border-bottom: 1px solid #f8f8f8; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fef6f9; }

    tbody td { padding: 12px 16px; font-size: 0.87rem; vertical-align: middle; }

    .td-rank { color: #ccc; font-weight: 700; font-size: 0.8rem; width: 30px; }
    .td-name { font-weight: 600; }
    .td-brand { color: #aaa; font-size: 0.76rem; }
    .td-price { color: #FF4081; font-weight: 700; white-space: nowrap; }
    .td-last  { color: #bbb; font-size: 0.75rem; white-space: nowrap; }
    .td-clicks { font-weight: 700; font-size: 1rem; text-align: right; }
    .td-clicks.zero    { color: #ddd; }
    .td-clicks.nonzero { color: #333; }

    .bar { height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; min-width: 50px; }
    .bar-fill { height: 100%; background: #FF4081; border-radius: 3px; transition: width 0.5s ease; }

    /* States */
    .state-box {
      text-align: center;
      padding: 50px 20px;
      color: #bbb;
    }

    .state-box .icon { font-size: 2.5rem; }
    .state-box p { margin-top: 10px; font-size: 0.9rem; line-height: 1.6; }
    .state-box .err { color: #e53935; font-size: 0.82rem; margin-top: 6px; }

    /* Note */
    .note {
      margin-top: 20px;
      padding: 12px 16px;
      background: #e8f5e9;
      border-left: 3px solid #43a047;
      border-radius: 0 8px 8px 0;
      font-size: 0.8rem;
      color: #2e6b30;
      line-height: 1.6;
    }

    @media (max-width: 540px) {
      .summary { grid-template-columns: repeat(2, 1fr); }
      .td-last, thead th:nth-child(4), tbody td:nth-child(4) { display: none; }
      .dash-header { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <!-- ── LOGIN ── -->
  <div id="loginScreen" class="login-wrap">
    <div class="login-card">
      <div class="logo">🏷️</div>
      <h1>Tiki Toko</h1>
      <p>Dashboard Admin</p>
      <input
        type="password"
        id="pwInput"
        placeholder="Masukkan password"
        onkeydown="if(event.key==='Enter') login()"
        autofocus
      />
      <button class="btn-login" onclick="login()">Masuk</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- ── DASHBOARD ── -->
  <div id="dashScreen" style="display:none">
    <div class="dash-header">
      <div>
        <h1>🏷️ Dashboard Tiki Toko</h1>
        <div class="subtitle">Statistik klik tombol Chat WA · Google Sheets</div>
      </div>
      <div class="header-actions">
        <button class="btn-header" onclick="loadDashboard()">↻ Refresh</button>
        <button class="btn-header" onclick="logout()">Keluar</button>
      </div>
    </div>

    <div class="dash-body">
      <div class="summary" id="summary"></div>

      <div class="table-wrap">
        <div class="table-head">
          <h2>Klik per Produk</h2>
          <span class="updated-at" id="updatedAt"></span>
          <button class="btn-reset" onclick="resetData()">Reset data</button>
        </div>
        <div id="tableContainer">
          <div class="state-box">
            <div class="icon">⏳</div>
            <p>Memuat data...</p>
          </div>
        </div>
      </div>

      <div class="note">
        ✅ Data tracking tersimpan di <strong>Google Sheets</strong> — klik dari semua pengunjung dan perangkat terekam secara real-time.
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    // ── CSV helpers (same logic as index.html) ────────────────
    async function fetchProductsCSV() {
      if (!SHEET_CSV_URL || SHEET_CSV_URL === "YOUR_CSV_URL_HERE") return [];
      try {
        const resp = await fetch(SHEET_CSV_URL);
        if (!resp.ok) return [];
        return csvToProducts(parseCSV(await resp.text()));
      } catch { return []; }
    }

    function parseCSV(text) {
      const rows = [];
      let row = [], field = "", inQ = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i], n = text[i + 1];
        if (inQ) {
          if (c === '"' && n === '"') { field += '"'; i++; }
          else if (c === '"') { inQ = false; }
          else { field += c; }
        } else {
          if      (c === '"')  { inQ = true; }
          else if (c === ',')  { row.push(field); field = ""; }
          else if (c === '\r' && n === '\n') { row.push(field); rows.push(row); row = []; field = ""; i++; }
          else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ""; }
          else { field += c; }
        }
      }
      if (field !== "" || row.length > 0) { row.push(field); rows.push(row); }
      return rows;
    }

    function csvToProducts(rows) {
      if (rows.length < 3) return [];
      const headers = rows[1].map(h => h.trim().toLowerCase());
      const col = name => headers.indexOf(name.toLowerCase());
      const iNo = col("no"), iName = col("nama barang"), iTreat = col("treatment"),
            iBrand = col("merk/tipe"), iPrice = col("harga");
      return rows.slice(2)
        .filter(r => (r[iName] || "").trim() && (r[iTreat] || "").trim().toLowerCase() === "dijual")
        .map(r => ({
          id   : parseInt((r[iNo] || "").trim()) || 0,
          name : (r[iName]  || "").trim(),
          brand: (r[iBrand] || "").trim(),
          price: parseInt(((r[iPrice] || "")).replace(/[^0-9]/g, "")) || 0,
        }));
    }
    // ─────────────────────────────────────────────────────────

    function login() {
      const pw  = document.getElementById("pwInput").value;
      const err = document.getElementById("loginError");
      if (pw === DASHBOARD_PASSWORD) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("dashScreen").style.display  = "block";
        loadDashboard();
      } else {
        err.textContent = "Password salah. Coba lagi.";
        document.getElementById("pwInput").value = "";
        document.getElementById("pwInput").focus();
      }
    }

    function logout() {
      document.getElementById("dashScreen").style.display  = "none";
      document.getElementById("loginScreen").style.display = "flex";
      document.getElementById("pwInput").value = "";
      document.getElementById("loginError").textContent    = "";
    }

    function formatPrice(p) {
      return "Rp " + p.toLocaleString("id-ID");
    }

    function formatDate(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleString("id-ID", {
        day: "numeric", month: "short", year: "numeric",
        hour: "2-digit", minute: "2-digit",
      });
    }

    function showTableState(icon, msg, sub = "") {
      document.getElementById("tableContainer").innerHTML = `
        <div class="state-box">
          <div class="icon">${icon}</div>
          <p>${msg}</p>
          ${sub ? `<p class="err">${sub}</p>` : ""}
        </div>`;
    }

    async function loadDashboard() {
      if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === "YOUR_APPS_SCRIPT_URL_HERE") {
        showTableState("⚙️",
          "APPS_SCRIPT_URL belum diisi.",
          "Buka <strong>config.js</strong> dan isi dengan URL dari Google Apps Script."
        );
        document.getElementById("summary").innerHTML = "";
        return;
      }

      showTableState("⏳", "Memuat data...");
      document.getElementById("updatedAt").textContent = "";

      // Baca tracker langsung dari published CSV (cepat, tanpa cold start)
      async function fetchTrackerCSV() {
        if (!TRACKER_CSV_URL || TRACKER_CSV_URL === "YOUR_TRACKER_CSV_URL_HERE") return null;
        try {
          const resp = await fetch(TRACKER_CSV_URL);
          if (!resp.ok) return [];
          const rows = parseCSV(await resp.text());
          if (rows.length < 2) return [];
          const headers = rows[0].map(h => h.trim().toLowerCase());
          const col = name => headers.indexOf(name);
          const iId = col("product_id"), iName = col("product_name"),
                iPc = col("product_clicks"), iWa = col("wa_clicks"), iLast = col("last_click");
          return rows.slice(1)
            .filter(r => r[iId])
            .map(r => ({
              productId    : Number(r[iId])   || 0,
              productName  : String(r[iName]  || ""),
              productClicks: Number(r[iPc]    || 0),
              waClicks     : Number(r[iWa]    || 0),
              lastClick    : r[iLast]         || null,
            }));
        } catch { return []; }
      }

      // Fetch produk dan tracker secara paralel
      const [csvProducts, sheetsData] = await Promise.all([
        fetchProductsCSV(),
        fetchTrackerCSV(),
      ]);

      if (sheetsData === null) {
        showTableState("⚙️", "TRACKER_CSV_URL belum diisi.",
          "Publish tab Clicks sebagai CSV lalu isi <strong>config.js → TRACKER_CSV_URL</strong>.");
        document.getElementById("summary").innerHTML = "";
        return;
      }

      const clickMap = {};
      (Array.isArray(sheetsData) ? sheetsData : []).forEach(row => {
        clickMap[row.productId] = {
          product: row.productClicks || 0,
          wa     : row.waClicks      || 0,
          last   : row.lastClick     || null,
        };
      });

      let productList = csvProducts;
      if (!productList.length) {
        productList = (Array.isArray(sheetsData) ? sheetsData : []).map(r => ({
          id: r.productId, name: r.productName, brand: "", price: 0,
        }));
      }

      const rows = productList.map(p => {
        const c = clickMap[p.id] || { product: 0, wa: 0, last: null };
        return {
          id           : p.id,
          name         : p.name,
          brand        : p.brand || "",
          price        : p.price,
          productClicks: c.product,
          waClicks     : c.wa,
          lastClick    : c.last,
        };
      }).sort((a, b) => (b.waClicks + b.productClicks) - (a.waClicks + a.productClicks));

      const totalWa      = rows.reduce((s, r) => s + r.waClicks, 0);
      const totalProduct = rows.reduce((s, r) => s + r.productClicks, 0);
      const active       = rows.filter(r => r.waClicks > 0 || r.productClicks > 0).length;
      const topProduct   = rows[0] && rows[0].waClicks > 0 ? rows[0].name : "—";
      const maxWa        = Math.max(...rows.map(r => r.waClicks), 1);

      // Summary
      document.getElementById("summary").innerHTML = `
        <div class="stat-card">
          <div class="label">Klik Chat WA</div>
          <div class="value">${totalWa}</div>
        </div>
        <div class="stat-card">
          <div class="label">Buka Produk</div>
          <div class="value">${totalProduct}</div>
        </div>
        <div class="stat-card">
          <div class="label">Produk Diminati</div>
          <div class="value">${active}</div>
          <div class="sub">dari ${productList.length} produk</div>
        </div>
        <div class="stat-card">
          <div class="label">Paling Diminati</div>
          <div class="value" style="font-size:0.85rem;padding-top:6px;line-height:1.3">${topProduct}</div>
        </div>`;

      document.getElementById("updatedAt").textContent =
        "Diperbarui: " + new Date().toLocaleTimeString("id-ID");

      if (totalWa + totalProduct === 0) {
        showTableState("📭", "Belum ada klik yang terekam.", "Bagikan link toko ke pembeli dan klik akan muncul di sini.");
        return;
      }

      const tbody = rows.map((r, i) => `
        <tr>
          <td class="td-rank">${i + 1}</td>
          <td>
            <div class="td-name">${r.name}</div>
            ${r.brand ? `<div class="td-brand">${r.brand}</div>` : ""}
          </td>
          <td class="td-price">${formatPrice(r.price)}</td>
          <td>
            <div class="bar">
              <div class="bar-fill" style="width:${(r.waClicks / maxWa * 100).toFixed(1)}%"></div>
            </div>
          </td>
          <td class="td-clicks ${r.productClicks > 0 ? "nonzero" : "zero"}">${r.productClicks}</td>
          <td class="td-clicks ${r.waClicks > 0 ? "nonzero" : "zero"}">${r.waClicks}</td>
          <td class="td-last">${formatDate(r.lastClick)}</td>
        </tr>`
      ).join("");

      document.getElementById("tableContainer").innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Produk</th>
              <th>Harga</th>
              <th style="min-width:70px">Grafik WA</th>
              <th style="text-align:right">Buka</th>
              <th style="text-align:right">WA</th>
              <th>Terakhir</th>
            </tr>
          </thead>
          <tbody>${tbody}</tbody>
        </table>`;
    }

    async function resetData() {
      if (!confirm("Reset semua data klik di Google Sheets?\nTindakan ini tidak bisa dibatalkan.")) return;
      try {
        await fetch(`${APPS_SCRIPT_URL}?action=reset`);
        await loadDashboard();
      } catch (err) {
        alert("Gagal reset: " + err.message);
      }
    }
  </script>
</body>
</html>
